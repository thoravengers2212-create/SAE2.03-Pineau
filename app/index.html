<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./component/Movie/style.css" />
    <link rel="stylesheet" href="./component/MovieDetail/style.css" />
    <link rel="stylesheet" href="./component/MovieCategory/style.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { DataMovie } from "./data/dataMovie.js";

      // Controleur
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      C.handlerDetail = async function (id) {
        // Récupère les détails du film depuis le serveur
        let movie = await DataMovie.requestMovieDetails(id);
        
        // Affiche les détails du film
        V.renderMovieDetail(movie);
      };

      C.handlerList = async function () {
        // Affiche la liste des films regroupés par catégorie
        let movies = await DataMovie.requestMovies();
        let categorizedMovies = DataMovie.groupByCategory(movies);
        V.renderMoviesByCategory(categorizedMovies);
      };

      C.start = async function () {
        V.renderNavBar("C.handlerAbout()");
        // Charger les films depuis le serveur et les afficher par catégorie
        let movies = await DataMovie.requestMovies();
        let categorizedMovies = DataMovie.groupByCategory(movies);
        V.renderMoviesByCategory(categorizedMovies);
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout);
      };

      /**
       * V.renderMovies
       *
       * Cette fonction est responsable de l'affichage de la liste des films.
       * Elle gère aussi le cas où aucun film n'est disponible.
       */
      V.renderMovies = function (movies) {
        let content = document.querySelector("#content");
        if (movies && movies.length > 0) {
          content.innerHTML = Movie.formatMany(movies);
        } else {
          content.innerHTML = '<div class="no-movies">Aucun film disponible pour le moment.</div>';
        }
      };

      /**
       * V.renderMoviesByCategory
       *
       * Cette fonction affiche les films regroupés par catégorie.
       * Utilise le composant MovieCategory pour afficher chaque catégorie.
       */
      V.renderMoviesByCategory = function (categorizedMovies) {
        let content = document.querySelector("#content");
        if (!categorizedMovies || Object.keys(categorizedMovies).length === 0) {
          content.innerHTML = '<div class="no-movies">Aucun film disponible pour le moment.</div>';
          return;
        }
        
        content.innerHTML = MovieCategory.formatMany(categorizedMovies);
      };

      /**
       * V.renderMovieDetail
       *
       * Cette fonction est responsable de l'affichage des détails d'un film.
       */
      V.renderMovieDetail = function (movie) {
        let content = document.querySelector("#content");
        if (movie && movie.id) {
          content.innerHTML = MovieDetail.format(movie);
        } else {
          content.innerHTML = '<div class="error">Film non trouvé.</div>';
        }
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
